name: Generate Video

on:
  workflow_call:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: runtime-config
          path: automation

      - name: Export runtime env
        run: python src/automation/export_runtime_env.py >> "$GITHUB_ENV"

      - name: Generate video
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: src
        run: python src/main.py

      - name: Find latest run
        id: latest-run
        run: |
          echo "run_dir=$(python src/automation/find_latest_run.py)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: generated-run
          path: ${{ steps.latest-run.outputs.run_dir }}
          if-no-files-found: error
