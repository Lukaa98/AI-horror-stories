name: Poll Video Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "45 */12 * * *"

permissions:
  contents: write

concurrency:
  group: ai-horror-poll-only
  cancel-in-progress: false

jobs:
  poll-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Materialize YouTube auth files
        shell: bash
        env:
          YOUTUBE_CLIENT_SECRET_JSON_B64: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON_B64 }}
          YOUTUBE_TOKEN_PICKLE_B64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}
        run: |
          test -n "$YOUTUBE_CLIENT_SECRET_JSON_B64"
          test -n "$YOUTUBE_TOKEN_PICKLE_B64"
          printf '%s' "$YOUTUBE_CLIENT_SECRET_JSON_B64" | base64 -d > "$RUNNER_TEMP/client_secret.json"
          printf '%s' "$YOUTUBE_TOKEN_PICKLE_B64" | base64 -d > "$RUNNER_TEMP/token.pickle"

      - name: Poll mature videos
        env:
          YOUTUBE_CLIENT_SECRET_FILE: ${{ runner.temp }}/client_secret.json
          YOUTUBE_TOKEN_FILE: ${{ runner.temp }}/token.pickle
          PYTHONPATH: src
        run: python src/automation/poll_history.py --out automation/polled_stats.json --min-age-hours 24 --repoll-after-hours 24 --limit 10

      - name: Update history
        env:
          PYTHONPATH: src
        run: python src/automation/update_history.py --stats-batch-metadata automation/polled_stats.json

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/history.json
          if git diff --cached --quiet; then
            echo "No history changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh video stats"
          git push
