name: Decide Next

on:
  workflow_call:

jobs:
  decide-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide next config
        run: python src/automation/decide_next.py

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-config
          path: automation/runtime_config.json

      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-state-decide
          path: |
            automation/state.json
            automation/history.json
