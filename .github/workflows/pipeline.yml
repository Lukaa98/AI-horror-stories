name: Content Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * *"

permissions:
  contents: write

concurrency:
  group: ai-horror-content-pipeline
  cancel-in-progress: false

jobs:
  decide:
    uses: ./.github/workflows/decide-next.yml

  generate:
    needs: decide
    if: needs.decide.outputs.should_publish == '1'
    uses: ./.github/workflows/generate-video.yml
    secrets: inherit

  upload:
    needs: generate
    if: needs.decide.outputs.should_publish == '1'
    uses: ./.github/workflows/upload-video.yml
    secrets: inherit

  commit-state-upload:
    runs-on: ubuntu-latest
    needs: upload
    if: needs.decide.outputs.should_publish == '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-state-upload
          path: automation
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/history.json automation/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update pipeline state"
          git push

  commit-state-skip:
    runs-on: ubuntu-latest
    needs: decide
    if: needs.decide.outputs.should_publish != '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-state-decide
          path: automation
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update publish cadence state"
          git push
