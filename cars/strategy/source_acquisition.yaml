# Cars-channel source acquisition plan. This staged configuration is not wired to uploads yet.

channel: cars
status: staged_only_not_connected_to_production_uploads
current_implementation:
  topic_discovery: cars/automation/discover_topics.py
  implemented_methods:
    - rss_feeds
    - youtube_atom_feeds_as_topic_signals_only
  not_implemented_yet:
    - browser_automation_for_configurators
    - marketplace_listing_scrapers
    - screenshot_capture
    - llm_script_generation_from_source_packets

principle: >
  Search/scrape code should collect URLs, titles, public metadata, screenshots from allowed pages,
  and factual source packets. GPT should not invent current topics from memory. GPT can rank,
  summarize, and script only after the acquisition step provides fresh source material.

pipeline_stages:
  - stage: discover_topic_signals
    purpose: Find fresh car/topic demand before generation.
    implemented: true
    methods:
      - RSS/Atom feeds from reputable car publications.
      - YouTube Atom feeds from monitored creators, used only to identify the car/topic being discussed.
    outputs:
      - automation/channels/cars/researched_topics.json

  - stage: verify_sources
    purpose: Convert a topic signal into a factual source packet.
    implemented: false
    methods:
      - Search official manufacturer pages and press releases for specs and claims.
      - Search reputable automotive publications for context.
      - For pricing, prefer official build-and-price pages or clearly dated marketplace/listing pages.
    required_before_generation: true

  - stage: browser_capture
    purpose: Capture official screenshots from configurators/build pages when allowed and useful.
    implemented: false
    recommended_tooling:
      - Playwright or Puppeteer for dynamic configurators.
      - Static requests/BeautifulSoup only for simple pages where allowed.
    allowed_targets:
      - official manufacturer pages
      - official build-and-price/configurator pages
      - pages with explicit media/press usage rights
    avoid_targets:
      - random copyrighted article images
      - creator video frames without permission
      - pages blocked by terms or robots policies

  - stage: generate_script
    purpose: Ask GPT to create a script from verified source packets, not from unsourced memory.
    implemented: false
    input_contract:
      - selected_topic
      - topic_signal_urls
      - verified_fact_source_urls
      - dated_price_or_trim_data
      - approved_media_or_screenshot_paths
    output_contract:
      - short_title
      - spoken_script
      - scene_plan
      - source_urls_for_description
      - factual_claims_used

source_types:
  creator_feed:
    role: topic_signal_only
    use_for:
      - identifying the car/topic people may search for
      - timing a related original Short near trend demand
    do_not_use_for:
      - factual specs unless independently verified
      - footage, screenshots, transcript, or script content
      - implying affiliation with the creator

  news_rss:
    role: research_source_candidate
    use_for:
      - finding fresh news topics
      - finding reputable context links
    needs_verification: true

  official_configurator:
    role: primary_fact_and_visual_source
    use_for:
      - trims
      - pricing when available
      - options/packages
      - official screenshots when allowed
    needs_browser_automation: often

  marketplace_listing:
    role: dated_deal_source
    use_for:
      - car deal of the day
      - mileage/title/location/price comparisons
    requirements:
      - capture date
      - listing URL
      - mileage
      - title status when available
      - comparable market prices
      - disclaimer that prices change

when_to_use_browser_automation:
  use_playwright_or_puppeteer_if:
    - page requires JavaScript to reveal trims, options, prices, or images
    - official configurator needs interactions before screenshots
    - screenshot is part of the video asset pipeline
  do_not_use_browser_automation_if:
    - RSS/API/static page already provides enough metadata
    - the target is a creator video page and we only need topic/title signal
    - the site terms disallow automated access
